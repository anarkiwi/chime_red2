name: test
on: [push, pull_request]
jobs:
  test-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arduino-platform: ["arduino:sam", "SparkFun:samd"]
        include:
          - arduino-platform: "arduino:sam"
            fqbn: "arduino:sam:arduino_due_x"
          - arduino-platform: "SparkFun:samd"
            fqbn: "SparkFun:samd:samd21_dev"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Test
        run: |
          ./build.sh ${{ matrix.arduino-platform }} ${{ matrix.fqbn }}
  host-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@master
      - name: Host unit tests + coverage (Docker)
        run: |
          ./test/host/run_tests.sh
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: host-test-coverage
          path: test/host/coverage/coverage.xml
          if-no-files-found: warn
